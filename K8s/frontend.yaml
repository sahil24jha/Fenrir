apiVersion: apps/v1
kind: Deployment
metadata:
  name: fenrir-frontend
  namespace: fenrir
spec:
  selector:
    matchLabels:
      app: fenrir-frontend
  template:
    metadata:
      labels:
        app: fenrir-frontend
    spec:
      containers:
      - name: fenrir-frontend
        image: docker.io/sahiljhaaa/fenrir-frontend
        ports:
        - containerPort: 9000
        env:
          - name:  BACKEND_URL
            value: http://fenrir-backend.fenrir.svc.cluster.local
---
apiVersion: v1
kind: Service
metadata:
  name: fenrir-frontend
  namespace: fenrir
spec:
  selector:
    app: fenrir-frontend
  ports:
  - port: 80
    targetPort: 9000
    type: ClusterIP

